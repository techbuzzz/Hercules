<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hercules">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E2A52"/>
      <stop offset="1" stop-color="#0B1230"/>
    </linearGradient>
    <linearGradient id="gold" x1="128" y1="96" x2="384" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD479"/>
      <stop offset="0.5" stop-color="#E8A93C"/>
      <stop offset="1" stop-color="#C07A1E"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#sheen)"/>
  <rect x="28" y="28" width="456" height="456" rx="100" fill="none" stroke="url(#gold)" stroke-width="6" stroke-opacity="0.55"/>

  <!-- Monogram H styled as two Doric columns joined by a bar (strength of Hercules) -->
  <g fill="url(#gold)">
    <!-- Left column -->
    <rect x="150" y="150" width="48" height="212" rx="10"/>
    <rect x="134" y="138" width="80" height="22" rx="8"/>
    <rect x="134" y="352" width="80" height="22" rx="8"/>
    <!-- Right column -->
    <rect x="314" y="150" width="48" height="212" rx="10"/>
    <rect x="298" y="138" width="80" height="22" rx="8"/>
    <rect x="298" y="352" width="80" height="22" rx="8"/>
    <!-- Cross bar -->
    <rect x="198" y="240" width="116" height="34" rx="10"/>
  </g>

  <!-- Laurel star spark above bar -->
  <circle cx="256" cy="206" r="13" fill="#FFF0CC"/>
  <path d="M256 188 l5 12 13 1 -10 8 4 13 -12 -7 -12 7 4 -13 -10 -8 13 -1 z" fill="#FFD479"/>
</svg>
