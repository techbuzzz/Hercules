<svg width="960" height="280" viewBox="0 0 960 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hercules — самообучающийся ИИ-агент">
  <defs>
    <linearGradient id="bg" x1="20" y1="20" x2="260" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E2A52"/>
      <stop offset="1" stop-color="#0B1230"/>
    </linearGradient>
    <linearGradient id="gold" x1="80" y1="60" x2="220" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD479"/>
      <stop offset="0.5" stop-color="#E8A93C"/>
      <stop offset="1" stop-color="#C07A1E"/>
    </linearGradient>
    <linearGradient id="word" x1="300" y1="80" x2="300" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5F7FF"/>
      <stop offset="1" stop-color="#C9D2F0"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="240" height="240" rx="56" fill="url(#bg)"/>
    <rect x="6" y="6" width="228" height="228" rx="50" fill="none" stroke="url(#gold)" stroke-width="3" stroke-opacity="0.55"/>
    <g fill="url(#gold)" transform="translate(0,0)">
      <rect x="66" y="74" width="24" height="104" rx="6"/>
      <rect x="58" y="68" width="40" height="12" rx="5"/>
      <rect x="58" y="172" width="40" height="12" rx="5"/>
      <rect x="150" y="74" width="24" height="104" rx="6"/>
      <rect x="142" y="68" width="40" height="12" rx="5"/>
      <rect x="142" y="172" width="40" height="12" rx="5"/>
      <rect x="90" y="118" width="60" height="18" rx="6"/>
    </g>
    <circle cx="120" cy="100" r="7" fill="#FFF0CC"/>
    <path d="M120 90 l3 7 7 1 -5 4 2 7 -7 -4 -7 4 2 -7 -5 -4 7 -1 z" fill="#FFD479"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="2" fill="url(#word)">HERCULES</text>
  <text x="304" y="200" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="6" fill="#E8A93C">SELF-IMPROVING AI AGENT</text>
</svg>
